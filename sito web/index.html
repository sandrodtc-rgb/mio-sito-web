  <p id="messaggio"></p>

  <script>
    // Prendiamo il form
    const form = document.getElementById("mioForm");

    form.addEventListener("submit", function (evento) {
      evento.preventDefault(); // blocca l'invio automatico

      const nome = document.getElementById("nome").value;
      const email = document.getElementById("email").value;
      const messaggio = document.getElementById("messaggio");

      // Controlli
      if (nome === "" || email === "") {
        messaggio.textContent = "Compila tutti i campi!";
        messaggio.className = "errore";
        return;
      }

      if (!email.includes("@")) {
        messaggio.textContent = "Inserisci un'email valida!";
        messaggio.className = "errore";
        return;
      }

      // Se tutto va bene
      messaggio.textContent = "Modulo inviato con successo ✅";
      messaggio.className = "successo";

      // Reset del form
      form.reset();
    });
  </script>
